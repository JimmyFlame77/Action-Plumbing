<div class="coupon-popup" id="couponPopup" role="dialog" aria-modal="true" aria-label="Special offer: Save 5% on Services">
  <button class="coupon-close" id="couponClose" aria-label="Close coupon offer">&#x2715;</button>
  <div class="coupon-snip">&#9988;</div>
  <h2 class="coupon-headline">Save 5% on Services</h2>
  <p class="coupon-body">Get 5% off your first $1,000 of services with <strong>Action Plumbing Heating &amp; HVAC</strong>. Stay comfortable and save money!</p>
  <p class="coupon-redeem">Call to Redeem</p>
  <p class="coupon-disclaimer">Not valid with any other offers or promotions. Restrictions apply.<br>Must mention this coupon at the time of scheduling.</p>
  <a href="tel:6102521256" class="coupon-btn">(610) 252-1256</a>
</div>

<script>
(function () {
  var popup = document.getElementById('couponPopup');
  var closeBtn = document.getElementById('couponClose');
  if (!popup || !closeBtn) return;
  if (sessionStorage.getItem('couponDismissed')) return;

  setTimeout(function () {
    popup.classList.add('is-visible');
  }, 3500);

  closeBtn.addEventListener('click', function () {
    popup.classList.remove('is-visible');
    sessionStorage.setItem('couponDismissed', '1');
  });
}());
</script>
